<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VNC</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:#0d0d0e;overflow:hidden}
    #screen{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
    #pwd-overlay{display:none;position:fixed;inset:0;z-index:10;background:rgba(8,8,8,.92);align-items:center;justify-content:center}
    #pwd-overlay.visible{display:flex}
    #pwd-box{background:#111213;border:1px solid #1e1f21;border-radius:12px;padding:24px 28px;display:flex;flex-direction:column;gap:12px;min-width:260px}
    #pwd-box label{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:12px;color:#8e8e93}
    #pwd-error{font-size:11px;color:#ff453a;display:none}
    #pwd-input{background:#0a0a0b;border:1px solid #1e1f21;border-radius:7px;padding:8px 10px;color:#e8e8ea;font-size:13px;font-family:"SF Mono",monospace;outline:none;width:100%}
    #pwd-input:focus{border-color:#4a90d9}
    #pwd-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#8e8e93;font-size:11.5px;padding:6px 14px;border-radius:6px;cursor:pointer;transition:background .15s,color .15s}
    #pwd-btn:hover{background:rgba(255,255,255,.12);color:#e8e8ea}
    #status{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);font-family:"SF Mono",monospace;font-size:11px;color:#8e8e93;background:rgba(13,13,14,.85);border:1px solid #1e1f21;border-radius:6px;padding:4px 10px;pointer-events:none;white-space:nowrap}

    /* ── Log colapsável ── */
    #log-toggle{position:fixed;top:8px;right:8px;z-index:21;font-family:"SF Mono",monospace;font-size:10px;color:#8e8e93;background:rgba(0,0,0,.75);border:1px solid #1e1f21;border-radius:5px;padding:3px 8px;cursor:pointer;user-select:none;transition:color .15s}
    #log-toggle:hover{color:#e8e8ea}
    #log-toggle.has-error{color:#ff453a;border-color:#ff453a}
    #log-panel{display:none;position:fixed;top:30px;right:8px;width:360px;max-height:160px;overflow-y:auto;font-family:"SF Mono",monospace;font-size:10px;color:#8e8e93;background:rgba(0,0,0,.88);border:1px solid #1e1f21;border-radius:6px;padding:6px 8px;z-index:20;pointer-events:none}
    #log-panel.open{display:block}
    #log-panel .ok{color:#30d158}
    #log-panel .err{color:#ff453a}
    #log-panel .info{color:#4a90d9}
  </style>
</head>
<body>
  <div id="screen"></div>

  <div id="pwd-overlay">
    <div id="pwd-box">
      <label>Senha VNC</label>
      <div id="pwd-error"></div>
      <input id="pwd-input" type="password" placeholder="••••••••" autocomplete="current-password"/>
      <button id="pwd-btn">Conectar</button>
    </div>
  </div>

  <div id="status">Conectando…</div>
  <button id="log-toggle">LOG ▸</button>
  <div id="log-panel"></div>

  <script type="module">
    import RFB from './core/rfb.js';

    const screen    = document.getElementById('screen');
    const status    = document.getElementById('status');
    const overlay   = document.getElementById('pwd-overlay');
    const pwdInput  = document.getElementById('pwd-input');
    const pwdBtn    = document.getElementById('pwd-btn');
    const pwdError  = document.getElementById('pwd-error');
    const logPanel  = document.getElementById('log-panel');
    const logToggle = document.getElementById('log-toggle');

    // ── Log colapsável ────────────────────────────────────────────────────────
    logToggle.addEventListener('click', () => {
      logPanel.classList.toggle('open');
      logToggle.textContent = logPanel.classList.contains('open') ? 'LOG ▾' : 'LOG ▸';
    });

    function log(msg, type = 'info') {
      const t = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
      const el = document.createElement('div');
      el.className = type;
      el.textContent = `[${t}] ${msg}`;
      logPanel.appendChild(el);
      logPanel.scrollTop = logPanel.scrollHeight;
      if (type === 'err') {
        logToggle.classList.add('has-error');
        logPanel.classList.add('open');
        logToggle.textContent = 'LOG ▾';
      }
    }

    // ── VNC ───────────────────────────────────────────────────────────────────
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const wsURL = `${proto}://${location.host}/ws/vnc`;
    let rfb = null;

    function connect() {
      if (rfb) { try { rfb.disconnect(); } catch(e) {} rfb = null; }
      log('Conectando...');
      status.textContent = 'Conectando…';
      try {
        rfb = new RFB(screen, wsURL);
        rfb.scaleViewport = true;
        rfb.resizeSession = true;
        rfb.viewOnly = false;
        rfb.focusOnClick = true;

        rfb.addEventListener('connect', () => {
          status.textContent = 'Conectado';
          log('Conectado!', 'ok');
          overlay.classList.remove('visible');
          setTimeout(() => rfb && rfb.focus(), 200);

          // Força recálculo de escala no contexto do iframe
          window.dispatchEvent(new Event('resize'));
          setTimeout(() => {
            window.dispatchEvent(new Event('resize'));
            const canvas = screen.querySelector('canvas');
            if (!canvas) { log('canvas: NÃO encontrado', 'err'); return; }
            const rect = canvas.getBoundingClientRect();
            log(`canvas nativo: ${canvas.width}x${canvas.height}`, 'info');
            log(`canvas CSS: ${Math.round(rect.width)}x${Math.round(rect.height)} em (${Math.round(rect.left)},${Math.round(rect.top)})`, 'info');
            log(`screen: ${screen.clientWidth}x${screen.clientHeight}`, 'info');
            // Fallback: se scaleViewport não reduziu o canvas, escalar manualmente
            if (rect.width > screen.clientWidth + 10 || rect.height > screen.clientHeight + 10) {
              log('scaleViewport inativo — aplicando escala manual', 'err');
              const sx = screen.clientWidth / canvas.width;
              const sy = screen.clientHeight / canvas.height;
              const s  = Math.min(sx, sy);
              canvas.style.width  = (canvas.width  * s) + 'px';
              canvas.style.height = (canvas.height * s) + 'px';
              log(`escala manual: ${s.toFixed(3)}x → ${Math.round(canvas.width*s)}x${Math.round(canvas.height*s)}`, 'ok');
            } else {
              log(`scaleViewport OK — escala: ${(rect.width/canvas.width).toFixed(3)}x`, 'ok');
            }
          }, 600);
        });

        rfb.addEventListener('disconnect', (e) => {
          const msg = e.detail.clean ? 'Desconectado' : `Conexão encerrada${e.detail.reason ? ': ' + e.detail.reason : ''}`;
          status.textContent = msg;
          log(msg, e.detail.clean ? 'info' : 'err');
        });

        rfb.addEventListener('credentialsrequired', () => {
          log('Servidor pediu senha (VNC auth)', 'info');
          status.textContent = 'Aguardando senha…';
          pwdError.style.display = 'none';
          overlay.classList.add('visible');
          pwdInput.focus();
        });

        rfb.addEventListener('securityfailure', (e) => {
          log('Senha incorreta: ' + JSON.stringify(e.detail), 'err');
          status.textContent = 'Senha incorreta';
          pwdError.textContent = 'Senha incorreta — tente novamente';
          pwdError.style.display = 'block';
          setTimeout(() => connect(), 500);
        });

      } catch(err) {
        log('Erro: ' + err.message, 'err');
        status.textContent = 'Erro: ' + err.message;
      }
    }

    function sendPassword() {
      const pwd = pwdInput.value;
      if (!pwd) return;
      overlay.classList.remove('visible');
      log(`Enviando senha (${pwd.length} chars)...`);
      if (rfb) rfb.sendCredentials({ password: pwd });
      pwdInput.value = '';
    }

    pwdBtn.addEventListener('click', sendPassword);
    pwdInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendPassword(); });

    // Refocus noVNC canvas em interação com a área da tela
    screen.addEventListener('mousedown', (e) => {
      window.focus();
      if (rfb) rfb.focus();
      const canvas = screen.querySelector('canvas');
      log(`mousedown (${e.clientX},${e.clientY}) | canvas=${!!canvas} | focused=${document.activeElement?.tagName}`, 'ok');
    });
    screen.addEventListener('mouseenter', () => { if (rfb) rfb.focus(); });

    // Log de teclado para diagnóstico
    document.addEventListener('keydown', (e) => {
      log(`keydown: ${e.key} | focused=${document.activeElement?.tagName}`, 'info');
    });

    connect();
  </script>
</body>
</html>
