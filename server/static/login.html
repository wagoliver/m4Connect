<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mac Mini M4 — Login</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080808;
      --card:#111213;
      --card-border:#1e1f21;
      --text:#e8e8ea;
      --text2:#8e8e93;
      --green:#30d158;
      --blue:#4a90d9;
      --radius:12px;
      --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",system-ui,sans-serif;
    }
    html,body{
      height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:var(--font);
      font-size:14px;
      -webkit-font-smoothing:antialiased;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .card{
      background:var(--card);
      border:1px solid var(--card-border);
      border-radius:var(--radius);
      padding:36px 32px;
      width:320px;
      display:flex;
      flex-direction:column;
      gap:20px;
    }
    .brand{
      text-align:center;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
    }
    .brand-icon{
      width:48px;
      height:48px;
      opacity:.85;
    }
    .brand h1{
      font-size:16px;
      font-weight:600;
      letter-spacing:.01em;
    }
    .brand p{
      font-size:12px;
      color:var(--text2);
    }
    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .field label{
      font-size:12px;
      color:var(--text2);
      font-weight:500;
    }
    .field input{
      background:#1a1b1d;
      border:1px solid var(--card-border);
      border-radius:8px;
      color:var(--text);
      font-family:inherit;
      font-size:14px;
      padding:9px 12px;
      outline:none;
      transition:border-color .15s;
    }
    .field input:focus{
      border-color:var(--blue);
    }
    .btn{
      background:var(--blue);
      border:none;
      border-radius:8px;
      color:#fff;
      cursor:pointer;
      font-family:inherit;
      font-size:14px;
      font-weight:600;
      padding:10px;
      width:100%;
      transition:opacity .15s;
    }
    .btn:hover{opacity:.88}
    .btn:active{opacity:.75}
    .error{
      background:#2a1414;
      border:1px solid #5a2020;
      border-radius:8px;
      color:#ff6b6b;
      font-size:12px;
      padding:9px 12px;
      text-align:center;
      display:none;
    }
    .error.show{display:block}
  </style>
</head>
<body>
  <form class="card" method="POST" action="/login">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="10" width="36" height="22" rx="4" fill="#2a2b2d" stroke="#3a3b3d" stroke-width="1.5"/>
        <rect x="10" y="14" width="28" height="14" rx="2" fill="#1a1b1d"/>
        <rect x="18" y="34" width="12" height="3" rx="1.5" fill="#2a2b2d"/>
        <rect x="14" y="37" width="20" height="2" rx="1" fill="#3a3b3d"/>
        <circle cx="24" cy="21" r="4" fill="#30d158" opacity=".9"/>
        <circle cx="24" cy="21" r="2" fill="#1a1b1d"/>
      </svg>
      <h1>Mac Mini M4</h1>
      <p>Entre com seu usuário do sistema</p>
    </div>

    <div id="err" class="error">Usuário ou senha inválidos</div>

    <div class="field">
      <label for="user">Usuário</label>
      <input id="user" name="user" type="text" autocomplete="username" autofocus required/>
    </div>
    <div class="field">
      <label for="pass">Senha</label>
      <input id="pass" name="pass" type="password" autocomplete="current-password" required/>
    </div>

    <button class="btn" type="submit">Entrar</button>
  </form>

  <script>
    const p = new URLSearchParams(location.search);
    if (p.get("err")) {
      document.getElementById("err").classList.add("show");
    }
  </script>
</body>
</html>
